name: Main Infrastructure

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    outputs:
      bastion_ip: ${{ steps.bastion.outputs.ip }}
      vpc_id: ${{ steps.tf_outputs.outputs.vpc_id }}
      alb_role_arn: ${{ steps.tf_outputs.outputs.alb_role_arn }}
      eso_irsa_role_arn: ${{ steps.tf_outputs.outputs.eso_irsa_role_arn }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT_NAME }}-github-bootstrap-role
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ">= 1.10.0"

      - name: Terraform Init
        run: |
          terraform -chdir=terraform init -reconfigure \
            -backend-config="bucket=shopverse-tfstate-${{ vars.AWS_ACCOUNT_ID }}" \
            -backend-config="key=main/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="use_lockfile=true"

      - name: Terraform Plan
        run: terraform -chdir=terraform plan -var-file="github-ci.tfvars" -out=tfplan

      - name: Terraform Apply
        run: terraform -chdir=terraform apply -auto-approve tfplan

      - name: Terraform Refresh
        run: terraform -chdir=terraform refresh -var-file="github-ci.tfvars"

      - name: Get Terraform outputs
        id: tf_outputs
        run: |
          set -euo pipefail
          echo "vpc_id=$(terraform -chdir=terraform output -raw vpc_id)" >> $GITHUB_OUTPUT
          echo "alb_role_arn=$(terraform -chdir=terraform output -raw alb_controller_role_arn)" >> $GITHUB_OUTPUT
          echo "eso_irsa_role_arn=$(terraform -chdir=terraform output -raw eso_irsa_role_arn)" >> $GITHUB_OUTPUT

      - name: Get Bastion IP
        id: bastion
        run: |
          BASTION_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=${{ vars.PROJECT_NAME }}-bastion" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text)
          echo "ip=$BASTION_IP" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy Platform via Bastion
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT_NAME }}-github-bootstrap-role
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to EKS via Bastion
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ needs.terraform.outputs.bastion_ip }}
          username: ubuntu
          key: ${{ secrets.BASTION_SSH_KEY }}
          envs: AWS_REGION,PROJECT_NAME,VPC_ID,ALB_ROLE_ARN,ESO_IRSA_ROLE_ARN
          script: |
            set -e
            sudo apt-get update
            sudo apt-get install -y curl wget unzip jq git python3-pip python3-venv

            # AWS CLI v2
            if ! command -v aws &> /dev/null; then
              curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
              unzip -o /tmp/awscliv2.zip -d /tmp/
              sudo /tmp/aws/install --update
            fi

            # kubectl
            KUBECTL_VERSION=$(curl -L -s https://dl.k8s.io/release/stable.txt)
            sudo curl -fsSL "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl" \
              -o /usr/local/bin/kubectl
            sudo chmod +x /usr/local/bin/kubectl

            # helm
            curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | sudo bash

            # ansible + kubernetes client
            sudo pip3 install --break-system-packages --ignore-installed \
              ansible ansible-core kubernetes

            # kubeconfig
            aws eks update-kubeconfig \
              --region "$AWS_REGION" \
              --name "${PROJECT_NAME}-cluster"

            # Clone repo and install Ansible collections
            rm -rf /tmp/shopverse-infra
            git clone --depth 1 https://github.com/${{ github.repository }}.git /tmp/shopverse-infra
            cd /tmp/shopverse-infra
            ansible-galaxy collection install -r ansible/requirements.yml

            # Run Ansible playbook
            ansible-playbook -i localhost, ansible/site.yml \
              -e "vpc_id=${VPC_ID}" \
              -e "cluster_name=${PROJECT_NAME}-cluster" \
              -e "aws_region=${AWS_REGION}" \
              -e "alb_controller_role_arn=${ALB_ROLE_ARN}" \
              -e "eso_irsa_role_arn=${ESO_IRSA_ROLE_ARN}"
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
          VPC_ID: ${{ needs.terraform.outputs.vpc_id }}
          ALB_ROLE_ARN: ${{ needs.terraform.outputs.alb_role_arn }}
          ESO_IRSA_ROLE_ARN: ${{ needs.terraform.outputs.eso_irsa_role_arn }}
name: Destroy Main Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm'
        required: true
        default: ''

permissions:
  id-token: write
  contents: read

env:
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  TF_VAR_db_username: ${{ secrets.DB_USERNAME }}

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Safety Check
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "destroy" ]; then
            echo "ERROR: You must type 'destroy' in the confirm field."
            exit 1
          fi
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "ERROR: Destroy can only run from the main branch."
            exit 1
          fi
          echo "Safety check passed. Proceeding with destruction."

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.PROJECT_NAME }}-github-bootstrap-role
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Terraform Init
        run: |
          terraform -chdir=terraform init -reconfigure \
            -backend-config="bucket=shopverse-tfstate-${{ vars.AWS_ACCOUNT_ID }}" \
            -backend-config="key=main/terraform.tfstate" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="use_lockfile=true"

      - name: Force Unlock State (if stale lock exists)
        run: |
          LOCK_ID=$(aws s3api get-object \
            --bucket shopverse-tfstate-${{ vars.AWS_ACCOUNT_ID }} \
            --key main/terraform.tfstate.tflock \
            /tmp/lockfile 2>/dev/null && \
            python3 -c "import json; print(json.load(open('/tmp/lockfile'))['ID'])" 2>/dev/null || echo "")

          if [ -n "$LOCK_ID" ]; then
            echo "Stale lock found: $LOCK_ID — force unlocking..."
            terraform -chdir=terraform force-unlock -force "$LOCK_ID"
          else
            echo "No stale lock found. Proceeding."
          fi
        continue-on-error: true

      - name: Terraform Plan (Destroy)
        run: terraform -chdir=terraform plan -destroy -var-file="github-ci.tfvars" -out=tfplan-destroy

      - name: Show Destroy Plan
        run: terraform -chdir=terraform show tfplan-destroy

      - name: Terraform Destroy
        run: terraform -chdir=terraform apply -auto-approve tfplan-destroy
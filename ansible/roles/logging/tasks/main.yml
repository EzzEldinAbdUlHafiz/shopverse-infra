---
- name: Create logging namespace
  kubernetes.core.k8s:
    name: logging
    api_version: v1
    kind: Namespace
    state: present

- name: Add grafana Helm repository
  kubernetes.core.helm_repository:
    name: grafana
    repo_url: https://grafana.github.io/helm-charts
    kubeconfig: "{{ eks_kubeconfig }}"

- name: Install loki via Helm
  kubernetes.core.helm:
    name: loki
    chart_ref: grafana/loki
    release_namespace: logging
    chart_version: "7.0.0"
    kubeconfig: "{{ eks_kubeconfig }}"
    state: present

- name: Install promtail via Helm
  kubernetes.core.helm:
    name: promtail
    chart_ref: grafana/promtail
    release_namespace: logging
    chart_version: "6.17.1"
    kubeconfig: "{{ eks_kubeconfig }}"
    state: present

- name: Verify Promtail DaemonSet is running on all nodes
  kubernetes.core.k8s_info:
    namespace: logging
    kind: Pod
    label_selectors:
      - "app.kubernetes.io/name=promtail"
    kubeconfig: "{{ eks_kubeconfig }}"
  register: promtail_pods
  until: "promtail_pods.resources | length > 0"
  retries: 10
  delay: 10

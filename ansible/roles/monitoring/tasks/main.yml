---
- name: Create monitoring namespace
  kubernetes.core.k8s:
    name: monitoring
    api_version: v1
    kind: Namespace
    state: present

- name: Add prometheus-community Helm repository
  kubernetes.core.helm_repository:
    name: prometheus-community
    repo_url: https://prometheus-community.github.io/helm-charts
    kubeconfig: "{{ eks_kubeconfig }}"

- name: Install kube-prometheus-stack via Helm
  kubernetes.core.helm:
    name: prometheus-stack
    chart_ref: prometheus-community/kube-prometheus-stack
    release_namespace: monitoring
    chart_version: "86.2.0"
    kubeconfig: "{{ eks_kubeconfig }}"
    state: present
    wait: true
    wait_timeout: 600s
    values:
      grafana:
        enabled: true
        service:
          type: ClusterIP
      prometheus:
        prometheusSpec:
          retention: 10d

- name: Wait for Grafana deployment to be ready
  kubernetes.core.k8s_info:
    kind: Deployment
    namespace: monitoring
    label_selectors:
      - "app.kubernetes.io/name=grafana"
    kubeconfig: "{{ eks_kubeconfig }}"
  register: grafana_deployment
  until: >
    grafana_deployment.resources | length > 0 and
    grafana_deployment.resources[0].status.readyReplicas is defined and
    grafana_deployment.resources[0].status.readyReplicas >= 1
  retries: 20
  delay: 15


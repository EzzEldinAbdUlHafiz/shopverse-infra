---
- name: Check if External Secrets Operator release exists
  shell: |
    helm list -n external-secrets -q | grep -q '^external-secrets$'
  register: eso_exists
  ignore_errors: true
  changed_when: false

- name: Add External Secrets Operator Helm repository
  kubernetes.core.helm_repository:
    name: external-secrets
    repo_url: https://charts.external-secrets.io
    state: present
  when: eso_exists.rc != 0

- name: Install External Secrets Operator
  kubernetes.core.helm:
    name: external-secrets
    chart_ref: external-secrets/external-secrets
    release_namespace: external-secrets
    create_namespace: true
    wait: true
    timeout: 300s
    values:
      crds:
        create: true
      replicaCount: 1
  when: eso_exists.rc != 0

- name: Wait for External Secrets Operator deployment to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: external-secrets
    namespace: external-secrets
  register: eso_deployment
  until: eso_deployment.resources | length > 0 and eso_deployment.resources[0].status.readyReplicas | default(0) > 0
  retries: 12
  delay: 10

- name: Wait for ClusterSecretStore CRD to be registered
  shell: |
    kubectl get crd clustersecretstores.external-secrets.io
  register: crd_check
  until: crd_check.rc == 0
  retries: 20
  delay: 5
  ignore_errors: false

- name: Apply ClusterSecretStore manifest via kubectl
  shell: |
    kubectl apply -f {{ playbook_dir }}/k8s/cluster-secret-store.yaml
  register: css_result
  until: css_result.rc == 0
  retries: 5
  delay: 10
---
- name: Add External Secrets Operator Helm repository
  kubernetes.core.helm_repository:
    name: external-secrets
    repo_url: https://charts.external-secrets.io
    state: present

- name: Install External Secrets Operator
  kubernetes.core.helm:
    name: external-secrets
    chart_ref: external-secrets/external-secrets
    release_namespace: external-secrets
    create_namespace: true
    wait: true
    timeout: 300s
    values:
      installCRDs: true
      replicaCount: 1

- name: Wait for External Secrets Operator to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: external-secrets
    namespace: external-secrets
  register: eso_deployment
  until: eso_deployment.resources | length > 0 and eso_deployment.resources[0].status.readyReplicas | default(0) > 0
  retries: 12
  delay: 10

- name: Wait for ClusterSecretStore CRD to be registered
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: clustersecretstores.external-secrets.io
  register: crd_check
  until: crd_check.resources | length > 0
  retries: 15
  delay: 5

- name: Apply ClusterSecretStore manifest
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('file', playbook_dir + '/k8s/cluster-secret-store.yaml') | from_yaml }}"
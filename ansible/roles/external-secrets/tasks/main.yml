---
- name: Add External Secrets Operator Helm repository
  kubernetes.core.helm_repository:
    name: external-secrets
    repo_url: https://charts.external-secrets.io
    state: present

- name: Update External Secrets Operator Helm repository
  kubernetes.core.helm:
    name: external-secrets
    chart_ref: external-secrets/external-secrets
    release_namespace: external-secrets
    create_namespace: true
    wait: true
    timeout: 600s
    # The chart ships the CRDs under templates/ and installs them by default
    # (crds.install=true since v0.10.0). Installing the release also registers
    # ClusterSecretStore and friends, so we don't need a separate kubectl apply.
    values:
      replicaCount: 1
      installCRDs: true

- name: Wait for External Secrets Operator deployment to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: external-secrets
    namespace: external-secrets
  register: eso_deployment
  until: eso_deployment.resources | length > 0 and eso_deployment.resources[0].status.readyReplicas | default(0) > 0
  retries: 12
  delay: 10

- name: Apply ClusterSecretStore manifest via kubectl
  shell: |
    kubectl apply -f {{ playbook_dir }}/k8s/cluster-secret-store.yaml
  register: css_result
  until: css_result.rc == 0
  retries: 5
  delay: 10
---
- name: Install Basic Tools
  apt:
    name: [curl, git, unzip, software-properties-common, python3-pip]
    state: present
    update_cache: yes

- name: Install AWS CLI
  shell: |
    curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
    unzip awscliv2.zip
    sudo ./aws/install --update-command-system-wide
  args:
    creates: /usr/local/bin/aws

- name: Install kubectl
  shell: |
    curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    chmod +x kubectl
    sudo mv kubectl /usr/local/bin/
  args:
    creates: /usr/local/bin/kubectl

- name: Install Python dependencies for kubernetes.core collection
  # The argocd role uses kubernetes.core.k8s / k8s_info on this host, which
  # need the official Python client (kubernetes), an OAuth helper, and
  # jsonpatch. Versions are pinned to the kubernetes.core collection's
  # requirements.txt.
  pip:
    name:
      - "kubernetes>=24.2.0"
      - "requests-oauthlib"
      - "jsonpatch"
    state: present

- name: Configure SSH Agent
  lineinfile:
    path: ~/.bashrc
    line: "eval $(ssh-agent -s)"
    state: present

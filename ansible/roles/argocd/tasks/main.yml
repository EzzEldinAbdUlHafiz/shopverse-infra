---
- name: Ensure kubeconfig directory exists
  ansible.builtin.file:
    path: "{{ eks_kubeconfig | dirname }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Update kubeconfig for EKS cluster
  ansible.builtin.command:
    cmd: >
      aws eks update-kubeconfig
      --region {{ aws_region }}
      --name {{ eks_cluster_name }}
      --kubeconfig {{ eks_kubeconfig }}
  changed_when: true

- name: Add ArgoCD Helm repository
  kubernetes.core.helm_repository:
    name: argo
    repo_url: https://argoproj.github.io/argo-helm
    kubeconfig: "{{ eks_kubeconfig }}"

- name: Install ArgoCD via Helm
  kubernetes.core.helm:
    name: argocd
    chart_ref: argo/argo-cd
    chart_version: "9.5.20"
    release_namespace: argocd
    create_namespace: true
    kubeconfig: "{{ eks_kubeconfig }}"
    state: present
    wait: true
    wait_timeout: 300s

- name: Wait for ArgoCD server deployment to be ready
  kubernetes.core.k8s_info:
    kind: Deployment
    name: argocd-server
    namespace: argocd
    kubeconfig: "{{ eks_kubeconfig }}"
  register: argocd_deployment
  until: >
    argocd_deployment.resources | length > 0 and
    argocd_deployment.resources[0].status.readyReplicas is defined and
    argocd_deployment.resources[0].status.readyReplicas >= 1
  retries: 20
  delay: 15


---
# The SSH bastion for connecting to the private Jenkins host is configured
# per-execution:
#   - In CI, .github/workflows/infra-deploy.yml discovers the jump server's
#     public IP at runtime and exports ANSIBLE_SSH_COMMON_ARGS with a
#     ProxyCommand. The runner cannot reach the private subnet directly.
#   - When run locally (./ansible-run.sh) from a machine that has direct
#     network access to the private subnet, no ProxyCommand is required.
# If you need a manual jump from a workstation that cannot reach the private
# subnet, set ANSIBLE_SSH_COMMON_ARGS in your shell before running
# ansible-playbook.

# Jenkins JCasC Variables
github_repo_url: "https://github.com/EzzEldinAbdUlHafiz/shopverse-infra.git"
github_user: "jenkins-user"
github_token_secret_id: "shopverse/jenkins/github_token"
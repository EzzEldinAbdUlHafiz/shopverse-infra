[defaults]
host_key_checking    = False
remote_user          = ubuntu
roles_path           = ./roles
stdout_callback      = default
callback_result_format = yaml
retry_files_enabled  = False

[ssh_connection]
pipelining = True
ssh_args   = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 -o ServerAliveInterval=30 -o ServerAliveCountMax=3
[defaults]
inventory            = inventory/
host_key_checking    = False
remote_user          = ubuntu
roles_path           = ./roles
deprecation_warnings = False
collections_path     = ./collections
# Use the built-in default callback with YAML-formatted task results. The
# 'yaml' callback from community.general is not in our requirements set, so
# referencing it here caused the runner to fail with "Could not load 'yaml'
# callback plugin". The default callback's result_format=yaml gives the same
# readable output using only ansible-core.
stdout_callback      = default
callback_result_format = yaml
retry_files_enabled  = False

# Cache facts within a single run to skip re-gathering on repeat plays
gathering            = smart
fact_caching         = memory

[ssh_connection]
pipelining = True
ssh_args   = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30 -o ServerAliveInterval=30 -o ServerAliveCountMax=3